<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Trust Gap Team Assessment — Radical Candor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --orange:#E8440A;
  --orange-light:#FDF0EC;
  --orange-mid:#F5C4B3;
  --dark:#1A1A2E;
  --dark2:#2d2d4a;
  --gray:#6B6B80;
  --light:#FAFAF8;
  --white:#FFFFFF;
  --teal:#0F6E56;
  --teal-light:#E1F5EE;
  --amber:#854F0B;
  --amber-light:#FAEEDA;
  --border:#E8E4DE;
}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--light);
  color:var(--dark2);
  min-height:100vh;
  line-height:1.6;
}

/* ── HEADER ── */
.header{
  background:var(--orange);
  padding:20px 40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.logo{
  font-family:'DM Serif Display',serif;
  font-size:18px;
  color:white;
  letter-spacing:0.5px;
}
.header-sub{
  font-size:12px;
  color:rgba(255,255,255,0.7);
  letter-spacing:1.5px;
  text-transform:uppercase;
}

/* ── PROGRESS ── */
.progress-bar-wrap{
  background:rgba(255,255,255,0.2);
  height:3px;
  width:100%;
}
.progress-bar-fill{
  height:3px;
  background:white;
  transition:width 0.5s ease;
}

/* ── SCREENS ── */
.screen{display:none;}
.screen.active{display:block;}

/* ── INTRO ── */
.intro-wrap{
  max-width:640px;
  margin:0 auto;
  padding:80px 24px;
  text-align:center;
}
.intro-eyebrow{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--orange);
  margin-bottom:20px;
}
.intro-title{
  font-family:'DM Serif Display',serif;
  font-size:clamp(36px,6vw,56px);
  color:var(--dark);
  line-height:1.15;
  margin-bottom:20px;
}
.intro-title em{
  color:var(--orange);
  font-style:italic;
}
.intro-body{
  font-size:17px;
  color:var(--gray);
  max-width:480px;
  margin:0 auto 40px;
  line-height:1.7;
}
.intro-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-bottom:48px;
}
.stat{
  background:white;
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px 12px;
}
.stat-num{
  font-family:'DM Serif Display',serif;
  font-size:28px;
  color:var(--orange);
  margin-bottom:4px;
}
.stat-label{
  font-size:12px;
  color:var(--gray);
  line-height:1.4;
}
.btn-primary{
  display:inline-block;
  background:var(--orange);
  color:white;
  font-family:'DM Sans',sans-serif;
  font-size:16px;
  font-weight:500;
  padding:16px 40px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  transition:transform 0.15s, box-shadow 0.15s;
  text-decoration:none;
}
.btn-primary:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(232,68,10,0.3);
}
.intro-note{
  margin-top:20px;
  font-size:13px;
  color:var(--gray);
}

/* ── SECTION INTRO ── */
.section-intro-wrap{
  max-width:560px;
  margin:0 auto;
  padding:80px 24px;
  text-align:center;
}
.section-num{
  width:40px;
  height:40px;
  background:var(--orange);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 24px;
  font-size:16px;
  font-weight:500;
  color:white;
}
.section-title{
  font-family:'DM Serif Display',serif;
  font-size:clamp(26px,4vw,38px);
  color:var(--dark);
  margin-bottom:16px;
  line-height:1.2;
}
.section-body{
  font-size:16px;
  color:var(--gray);
  margin-bottom:40px;
  line-height:1.7;
}

/* ── QUESTION ── */
.q-wrap{
  max-width:640px;
  margin:0 auto;
  padding:60px 24px 40px;
}
.q-meta{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:32px;
}
.q-num-badge{
  background:var(--orange);
  color:white;
  font-size:13px;
  font-weight:500;
  padding:4px 12px;
  border-radius:20px;
}
.q-section-label{
  font-size:12px;
  color:var(--gray);
  letter-spacing:1px;
  text-transform:uppercase;
}
.q-text{
  font-family:'DM Serif Display',serif;
  font-size:clamp(22px,3.5vw,30px);
  color:var(--dark);
  line-height:1.3;
  margin-bottom:12px;
}
.q-sub{
  font-size:14px;
  color:var(--gray);
  font-style:italic;
  margin-bottom:36px;
}
.opts{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:40px;
}
.opt{
  display:flex;
  align-items:flex-start;
  gap:14px;
  background:white;
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:16px 18px;
  cursor:pointer;
  transition:border-color 0.15s, background 0.15s, transform 0.1s;
  text-align:left;
}
.opt:hover{
  border-color:var(--orange);
  transform:translateX(2px);
}
.opt.selected{
  border-color:var(--orange);
  background:var(--orange-light);
}
.opt-key{
  flex-shrink:0;
  width:26px;
  height:26px;
  border-radius:50%;
  border:1.5px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:500;
  color:var(--gray);
  transition:all 0.15s;
  margin-top:1px;
}
.opt.selected .opt-key{
  background:var(--orange);
  border-color:var(--orange);
  color:white;
}
.opt-text{
  font-size:15px;
  color:var(--dark2);
  line-height:1.55;
}
.opt.selected .opt-text{
  color:var(--dark);
}
.q-nav{
  display:flex;
  justify-content:flex-end;
}
.btn-next{
  background:var(--orange);
  color:white;
  border:none;
  border-radius:8px;
  padding:13px 32px;
  font-size:15px;
  font-family:'DM Sans',sans-serif;
  font-weight:500;
  cursor:pointer;
  opacity:0.35;
  pointer-events:none;
  transition:opacity 0.2s, transform 0.15s, box-shadow 0.15s;
}
.btn-next.ready{
  opacity:1;
  pointer-events:auto;
}
.btn-next.ready:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(232,68,10,0.3);
}

/* ── URGENCY SCREEN ── */
.urgency-wrap{
  max-width:600px;
  margin:0 auto;
  padding:60px 24px;
}
.urgency-title{
  font-family:'DM Serif Display',serif;
  font-size:clamp(24px,3.5vw,32px);
  color:var(--dark);
  margin-bottom:10px;
  text-align:center;
}
.urgency-sub{
  font-size:15px;
  color:var(--gray);
  text-align:center;
  margin-bottom:40px;
  font-style:italic;
}

/* ── RESULTS ── */
.result-wrap{
  max-width:680px;
  margin:0 auto;
  padding:60px 24px 80px;
}
.result-eyebrow{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--orange);
  margin-bottom:16px;
}
.result-profile-name{
  font-family:'DM Serif Display',serif;
  font-size:clamp(28px,5vw,44px);
  color:var(--dark);
  margin-bottom:20px;
  line-height:1.2;
}
.score-display{
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:32px;
}
.score-ring-wrap{
  flex-shrink:0;
}
.score-bar-track{
  flex:1;
  height:8px;
  background:var(--border);
  border-radius:4px;
  overflow:hidden;
}
.score-bar-fill{
  height:8px;
  border-radius:4px;
  transition:width 1.2s ease;
}
.score-pct-label{
  font-family:'DM Serif Display',serif;
  font-size:32px;
  color:var(--dark);
  flex-shrink:0;
}
.result-desc{
  font-size:16px;
  color:var(--gray);
  line-height:1.75;
  margin-bottom:40px;
  padding:24px;
  background:white;
  border:1px solid var(--border);
  border-radius:12px;
  border-left:4px solid var(--orange);
}
.dim-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:40px;
}
@media(max-width:560px){.dim-grid{grid-template-columns:1fr;}}
.dim-card{
  background:white;
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
}
.dim-card.full{grid-column:1/-1;}
.dim-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--gray);
  margin-bottom:6px;
}
.dim-name{
  font-size:14px;
  font-weight:500;
  color:var(--dark);
  margin-bottom:10px;
}
.dim-bar-track{
  height:6px;
  background:var(--border);
  border-radius:3px;
  margin-bottom:6px;
  overflow:hidden;
}
.dim-bar-fill{
  height:6px;
  border-radius:3px;
  transition:width 1.4s ease;
}
.dim-insight{
  font-size:13px;
  color:var(--gray);
  line-height:1.55;
  margin-top:8px;
}
.cta-box{
  background:var(--orange);
  border-radius:16px;
  padding:36px;
  text-align:center;
  margin-bottom:16px;
}
.cta-box h3{
  font-family:'DM Serif Display',serif;
  font-size:24px;
  color:white;
  margin-bottom:12px;
  line-height:1.3;
}
.cta-box p{
  font-size:15px;
  color:rgba(255,255,255,0.82);
  margin-bottom:28px;
  line-height:1.65;
  max-width:440px;
  margin-left:auto;
  margin-right:auto;
}
.btn-white{
  display:inline-block;
  background:white;
  color:var(--orange);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:500;
  padding:14px 32px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  transition:transform 0.15s;
  text-decoration:none;
  margin-bottom:12px;
  width:100%;
}
.btn-white:hover{transform:translateY(-1px);}
.btn-outline-white{
  display:inline-block;
  background:transparent;
  color:white;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:400;
  padding:12px 32px;
  border-radius:8px;
  border:1.5px solid rgba(255,255,255,0.4);
  cursor:pointer;
  transition:border-color 0.15s;
  text-decoration:none;
  width:100%;
}
.btn-outline-white:hover{border-color:rgba(255,255,255,0.8);}
.restart-link{
  text-align:center;
  margin-top:24px;
  font-size:13px;
  color:var(--gray);
}
.restart-link a{color:var(--orange);cursor:pointer;text-decoration:underline;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.screen.active .q-wrap,
.screen.active .intro-wrap,
.screen.active .section-intro-wrap,
.screen.active .urgency-wrap,
.screen.active .result-wrap{
  animation:fadeUp 0.35s ease forwards;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Radical Candor</div>
  <div class="header-sub">State of the Workplace</div>
</div>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress" style="width:0%"></div>
</div>

<div id="app"></div>

<script>
const QUESTIONS = [
  // Section 1: Team feedback culture
  { id:'q1', section:1, sLabel:'Team feedback culture',
    text:'When someone on your team makes a significant mistake, what typically happens?',
    sub:'Think about the last time this occurred.',
    opts:[
      'It gets addressed directly and soon after — the person knows what happened and what to do differently.',
      'It\'s discussed privately with me but rarely raised with the person who made it.',
      'It gets noted internally but smoothed over to avoid making anyone feel bad.',
      'It circulates in side conversations before — or instead of — reaching the person involved.'
    ], scores:[4,2,1,0] },
  { id:'q2', section:1, sLabel:'Team feedback culture',
    text:'How often do your team members give each other feedback — peer-to-peer, not just up or down?',
    sub:null,
    opts:[
      'Regularly and naturally — it\'s part of how the team works.',
      'Occasionally, usually when a specific project or conflict forces it.',
      'Rarely — people keep feedback to themselves or bring it to me instead.',
      'Almost never, and when it happens it\'s usually political or pointed.'
    ], scores:[4,2,1,0] },
  { id:'q3', section:1, sLabel:'Team feedback culture',
    text:'When you ask your team "how are things going?" in a 1:1 or meeting, what do you typically hear?',
    sub:null,
    opts:[
      'Real things — what\'s working, what\'s frustrating, what they need.',
      'Generally positive — "things are good" — even when I suspect they aren\'t.',
      'Polished answers that feel safe rather than honest.',
      'Complaints about others rather than direct feedback about the situation.'
    ], scores:[4,2,1,0] },
  { id:'q4', section:1, sLabel:'Team feedback culture',
    text:'Think about the last time someone on your team pushed back on a decision you made. When did it happen?',
    sub:null,
    opts:[
      'In the moment — they said something directly and we worked through it.',
      'After the fact, in private, once the decision was already in motion.',
      'It rarely happens — people tend to go along even when I sense they disagree.',
      'I\'m not sure — I hear more about disagreements secondhand than directly.'
    ], scores:[4,2,1,0] },
  // Section 2: Leadership style
  { id:'q5', section:2, sLabel:'Your leadership style',
    text:'A team member\'s work has been slipping for a few weeks. You\'ve noticed. What do you do?',
    sub:null,
    opts:[
      '"I\'ve noticed things have felt harder lately — what\'s going on, and how can I help?" Specific, soon, direct.',
      'I raise it eventually, but I let it build longer than I should before saying something.',
      'I adjust their workload or assignments rather than addressing it directly.',
      'I hold my concerns privately and hope the situation resolves itself.'
    ], scores:[4,2,1,0] },
  { id:'q6', section:2, sLabel:'Your leadership style',
    text:'When you give critical feedback, how does your team typically respond?',
    sub:'Be honest — think about what you actually observe, not what you hope for.',
    opts:[
      'They engage with it. Sometimes they push back, and that\'s welcomed. It leads somewhere.',
      'They nod and agree — but I\'m not always sure it lands the way I intend.',
      'People seem relieved when it\'s over. It doesn\'t feel like an exchange.',
      'I\'m not sure — feedback conversations don\'t feel productive and I avoid them.'
    ], scores:[4,2,1,0] },
  { id:'q7', section:2, sLabel:'Your leadership style',
    text:'The last time a team member gave YOU feedback about your leadership — how did it go?',
    sub:null,
    opts:[
      'I took it seriously, asked follow-up questions, and they saw me actually change something.',
      'I listened, thanked them, and thought about it — but I\'m not sure they noticed a shift.',
      'It felt uncomfortable. I may have responded in a way that discouraged them from doing it again.',
      'It hasn\'t really happened — I don\'t think my team feels safe giving me feedback.'
    ], scores:[4,2,1,0] },
  { id:'q8', section:2, sLabel:'Your leadership style',
    text:'When you praise someone on your team, what does it typically sound like?',
    sub:null,
    opts:[
      'Specific: "That thing you did in the client meeting — the way you reframed their objection — that was exactly right."',
      'Positive but general: "Great work on that project." Sincere, but not always detailed.',
      'Generous — I err on the side of encouragement, even when I\'m softening harder truths.',
      'Infrequent — I\'m better at noting problems than recognising what\'s going well.'
    ], scores:[4,2,1,0] },
  // Section 3: Psychological safety
  { id:'q9', section:3, sLabel:'Psychological safety',
    text:'If a team member realised mid-project they\'d made a significant error, how likely are they to tell you immediately?',
    sub:null,
    opts:[
      'Very likely — they know I want to know early so we can fix it together.',
      'Probably — but they might try to resolve it quietly first before coming to me.',
      'Unlikely — the instinct is to manage it themselves and hope it doesn\'t escalate.',
      'Very unlikely — the fear of how I\'ll react is real enough that silence feels safer.'
    ], scores:[4,2,1,0] },
  { id:'q10', section:3, sLabel:'Psychological safety',
    text:'Does your team speak up in group settings the same way they do in 1:1s with you?',
    sub:null,
    opts:[
      'Mostly yes — the table doesn\'t change what people are willing to say.',
      'Somewhat — people are more candid with me privately than in front of others.',
      'Not really — meetings tend to produce agreement and the real conversation happens afterward.',
      'No — even in 1:1s people are guarded. I rarely feel like I\'m getting the full picture.'
    ], scores:[4,2,1,0] },
  { id:'q11', section:3, sLabel:'Psychological safety',
    text:'Does your top performer know — clearly and specifically — what\'s exceptional about their work and what growth looks like for them?',
    sub:null,
    opts:[
      'Yes — we\'ve talked about it explicitly and they could articulate it themselves.',
      'Partially — I\'ve hinted at it but I\'m not sure they have a clear picture.',
      'Probably not — I assume they know they\'re valued but I haven\'t said it specifically.',
      'No — and this is a gap I\'m aware of but haven\'t closed.'
    ], scores:[4,2,1,0] },
  { id:'q12', section:3, sLabel:'Psychological safety',
    text:'If you left the team tomorrow, would the feedback culture you\'ve built survive without you?',
    sub:'This is the hardest question. Answer it honestly.',
    opts:[
      'Yes — the norms are embedded. The team gives and gets feedback independent of my presence.',
      'Partially — some of it would stick, but I\'m probably the main driver right now.',
      'Probably not — the culture depends heavily on me personally modelling it.',
      'No — and I\'m not sure we have much of a feedback culture to sustain.'
    ], scores:[4,2,1,0] }
];

const URGENCY_OPTS = [
  { v:'offsite', t:'We have an offsite or team event in the next 60 days' },
  { v:'quarter', t:'This is a priority for this quarter' },
  { v:'nexthalf', t:'I\'m planning for next half or next year' },
  { v:'research', t:'I\'m still in research mode' }
];

const state = { screen:0, answers:{}, sScores:{1:0,2:0,3:0}, urgency:null };

// screen order: intro, s1-intro, q1-q4, s2-intro, q5-q8, s3-intro, q9-q12, urgency, result
const FLOW = ['intro','s1','q1','q2','q3','q4','s2','q5','q6','q7','q8','s3','q9','q10','q11','q12','urgency','result'];

function cur(){ return FLOW[state.screen]; }

function totalQ(){ return Object.keys(state.answers).length; }

function updateProgress(){
  const pct = Math.round(totalQ() / 12 * 100);
  document.getElementById('progress').style.width = pct + '%';
}

function next(){
  state.screen++;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectOpt(qid, idx, score, section){
  const prev = state.answers[qid];
  const q = QUESTIONS.find(x=>x.id===qid);
  if(prev !== undefined) state.sScores[section] -= q.scores[prev];
  state.answers[qid] = idx;
  state.sScores[section] += score;
  updateProgress();
  document.querySelectorAll('.opt').forEach((el,i)=>{
    el.classList.toggle('selected', i===idx);
  });
  document.querySelector('.btn-next').classList.add('ready');
}

function selectUrgency(v){
  state.urgency = v;
  document.querySelectorAll('.opt').forEach(el=>{
    el.classList.toggle('selected', el.dataset.v===v);
  });
  document.querySelector('.btn-next').classList.add('ready');
}

function getProfile(){
  const total = Object.values(state.sScores).reduce((a,b)=>a+b,0);
  const max = 48;
  const pct = Math.round(total/max*100);
  const s1 = Math.round(state.sScores[1]/16*100);
  const s2 = Math.round(state.sScores[2]/16*100);
  const s3 = Math.round(state.sScores[3]/16*100);

  let name, desc, ctaHead, ctaBody, cta1, cta2, color;

  if(pct>=75){
    name='Feedback-forward team';
    desc='Your team has a genuinely strong feedback culture. People speak up, mistakes get addressed, and you\'re modelling the behaviour you want to see. The risk at this level isn\'t absence of feedback — it\'s complacency. The goal now is making it systematic and scalable so it doesn\'t depend on you personally being in the room.';
    ctaHead='Ready to make this stick?';
    ctaBody='The teams that sustain a strong feedback culture are the ones who systematise it. Let\'s talk about what that looks like at your scale.';
    cta1='Book a 30-minute conversation';
    cta2='Explore Compass';
    color='#1D9E75';
  } else if(pct>=50){
    name='Emerging candor culture';
    desc='There are real strengths here — you care, some feedback is flowing, and people trust you enough to share some of what they\'re thinking. But the gaps are real. Feedback is probably inconsistent across the team, and some people are getting much clearer input than others. This is the stage where intentional practice makes the biggest difference.';
    ctaHead='Ready to make this systematic?';
    ctaBody='Going from inconsistent to intentional is the move most teams don\'t make until something goes wrong. Let\'s talk about what that looks like for yours.';
    cta1='Book a 30-minute conversation';
    cta2='Join our next webinar';
    color='#E8440A';
  } else if(pct>=25){
    name='Trust gap in progress';
    desc='Your team is operating with a meaningful trust deficit. Feedback is being filtered, softened, or avoided — and the gap between what people say in meetings and what they actually think is probably wider than you realise. The good news: this is fixable, and the fact that you\'re here assessing it honestly is the first move.';
    ctaHead='Ready to close the gap?';
    ctaBody='We\'ve helped teams at every stage work through exactly this. A 30-minute conversation costs nothing and clarifies everything.';
    cta1='Book a 30-minute conversation';
    cta2='Join our next webinar';
    color='#BA7517';
  } else {
    name='Significant trust gap';
    desc='The signals here are serious. People on your team are unlikely to give you real feedback, surface problems early, or push back when it matters. This doesn\'t mean you\'ve failed — it means the system hasn\'t given you or your team the tools to do this differently. That\'s a solvable problem. But it requires practice, not just content.';
    ctaHead='This needs more than a resource.';
    ctaBody='A 30-minute conversation will help you figure out what to do first — and what\'s actually possible in your specific situation. No pitch deck. Real questions answered.';
    cta1='Book a conversation this week';
    cta2='Join our next webinar';
    color='#E24B4A';
  }

  return {name,desc,ctaHead,ctaBody,cta1,cta2,color,pct,s1,s2,s3};
}

function getDimInsight(pct, dim){
  if(dim===1){
    if(pct>=75) return 'Feedback flows naturally and peer-to-peer. Your team has built norms that don\'t depend on you.';
    if(pct>=50) return 'Some feedback flows, but it\'s inconsistent. Some channels are open; others are blocked.';
    return 'Feedback is bottlenecking — either at you or not happening at all.';
  }
  if(dim===2){
    if(pct>=75) return 'You\'re modelling radical candor — specific, timely, and received well.';
    if(pct>=50) return 'You\'re trying to give honest feedback but something is getting lost in delivery or follow-through.';
    return 'There\'s a gap between your intentions and your team\'s experience of feedback from you.';
  }
  if(dim===3){
    if(pct>=75) return 'High psychological safety. People tell you things early and directly — including things that are hard to hear.';
    if(pct>=50) return 'Moderate safety. People trust you personally but candour hasn\'t fully generalised.';
    return 'Low psychological safety. Fear of consequences is shaping what people say and don\'t say.';
  }
}

function barColor(pct){
  if(pct>=75) return '#1D9E75';
  if(pct>=50) return '#E8440A';
  if(pct>=25) return '#BA7517';
  return '#E24B4A';
}

function render(){
  const id = cur();
  const app = document.getElementById('app');

  if(id==='intro'){
    app.innerHTML = `<div class="screen active"><div class="intro-wrap">
      <div class="intro-eyebrow">Radical Candor — State of the Workplace</div>
      <h1 class="intro-title">The Trust Gap<br><em>Team Assessment</em></h1>
      <p class="intro-body">12 questions across three dimensions. One honest look at how feedback actually flows on your team — and what to do about it.</p>
      <div class="intro-stats">
        <div class="stat"><div class="stat-num">12</div><div class="stat-label">Questions across 3 dimensions</div></div>
        <div class="stat"><div class="stat-num">5 min</div><div class="stat-label">Average completion time</div></div>
        <div class="stat"><div class="stat-num">4</div><div class="stat-label">Personalised result profiles</div></div>
      </div>
      <button class="btn-primary" onclick="next()">Start the assessment &rarr;</button>
      <div class="intro-note">No wrong answers — only honest ones.</div>
    </div></div>`;
  }
  else if(id==='s1'||id==='s2'||id==='s3'){
    const nums={s1:1,s2:2,s3:3};
    const titles={s1:'Your team\'s feedback culture',s2:'Your leadership style',s3:'Trust and psychological safety'};
    const subs={
      s1:'How feedback flows — or doesn\'t — across your team right now.',
      s2:'How you show up as a feedback-giver and what your team actually experiences.',
      s3:'The conditions that make honest feedback possible — or impossible.'
    };
    app.innerHTML = `<div class="screen active"><div class="section-intro-wrap">
      <div class="section-num">${nums[id]}</div>
      <h2 class="section-title">${titles[id]}</h2>
      <p class="section-body">${subs[id]}</p>
      <button class="btn-primary" onclick="next()">Begin &rarr;</button>
    </div></div>`;
  }
  else if(id==='urgency'){
    app.innerHTML = `<div class="screen active"><div class="urgency-wrap">
      <h2 class="urgency-title">One last thing</h2>
      <p class="urgency-sub">This doesn't affect your score — it helps us point you to the most useful next step.</p>
      <div class="opts">
        ${URGENCY_OPTS.map(o=>`<div class="opt${state.urgency===o.v?' selected':''}" data-v="${o.v}" onclick="selectUrgency('${o.v}')">
          <div class="opt-key">${state.urgency===o.v?'✓':''}</div>
          <div class="opt-text">${o.t}</div>
        </div>`).join('')}
      </div>
      <div class="q-nav"><button class="btn-next${state.urgency?' ready':''}" onclick="next()">See my results &rarr;</button></div>
    </div></div>`;
  }
  else if(id==='result'){
    const p = getProfile();
    setTimeout(()=>{
      document.getElementById('main-bar').style.width = p.pct+'%';
      document.getElementById('d1bar').style.width = p.s1+'%';
      document.getElementById('d2bar').style.width = p.s2+'%';
      document.getElementById('d3bar').style.width = p.s3+'%';
    }, 100);

    app.innerHTML = `<div class="screen active"><div class="result-wrap">
      <div class="result-eyebrow">Your Trust Gap Assessment Results</div>
      <h2 class="result-profile-name">${p.name}</h2>
      <div class="score-display">
        <div class="score-bar-track" style="flex:1"><div id="main-bar" class="score-bar-fill" style="width:0%;background:${p.color}"></div></div>
        <div class="score-pct-label">${p.pct}<span style="font-size:18px;color:var(--gray)">%</span></div>
      </div>
      <div class="result-desc">${p.desc}</div>
      <div class="dim-grid">
        <div class="dim-card">
          <div class="dim-label">Dimension 1</div>
          <div class="dim-name">Team feedback culture</div>
          <div class="dim-bar-track"><div id="d1bar" class="dim-bar-fill" style="width:0%;background:${barColor(p.s1)}"></div></div>
          <div class="dim-insight">${getDimInsight(p.s1,1)}</div>
        </div>
        <div class="dim-card">
          <div class="dim-label">Dimension 2</div>
          <div class="dim-name">Your leadership style</div>
          <div class="dim-bar-track"><div id="d2bar" class="dim-bar-fill" style="width:0%;background:${barColor(p.s2)}"></div></div>
          <div class="dim-insight">${getDimInsight(p.s2,2)}</div>
        </div>
        <div class="dim-card full">
          <div class="dim-label">Dimension 3</div>
          <div class="dim-name">Psychological safety</div>
          <div class="dim-bar-track"><div id="d3bar" class="dim-bar-fill" style="width:0%;background:${barColor(p.s3)}"></div></div>
          <div class="dim-insight">${getDimInsight(p.s3,3)}</div>
        </div>
      </div>
      <div class="cta-box">
        <h3>${p.ctaHead}</h3>
        <p>${p.ctaBody}</p>
        <button class="btn-white">${p.cta1} &rarr;</button>
        <button class="btn-outline-white">${p.cta2}</button>
      </div>
      <div class="restart-link"><a onclick="reset()">Retake the assessment</a></div>
    </div></div>`;
    setTimeout(()=>{
      document.getElementById('main-bar').style.width = p.pct+'%';
      document.getElementById('d1bar').style.width = p.s1+'%';
      document.getElementById('d2bar').style.width = p.s2+'%';
      document.getElementById('d3bar').style.width = p.s3+'%';
    }, 200);
  }
  else {
    // question screen
    const q = QUESTIONS.find(x=>x.id===id);
    const qNum = QUESTIONS.indexOf(q)+1;
    const hasAnswer = state.answers[id] !== undefined;
    app.innerHTML = `<div class="screen active"><div class="q-wrap">
      <div class="q-meta">
        <span class="q-num-badge">${qNum} of 12</span>
        <span class="q-section-label">${q.sLabel}</span>
      </div>
      <h2 class="q-text">${q.text}</h2>
      ${q.sub?`<p class="q-sub">${q.sub}</p>`:'<div style="margin-bottom:28px"></div>'}
      <div class="opts">
        ${q.opts.map((o,i)=>`<div class="opt${state.answers[id]===i?' selected':''}" onclick="selectOpt('${id}',${i},${q.scores[i]},${q.section})">
          <div class="opt-key">${['A','B','C','D'][i]}</div>
          <div class="opt-text">${o}</div>
        </div>`).join('')}
      </div>
      <div class="q-nav"><button class="btn-next${hasAnswer?' ready':''}" onclick="next()">Next &rarr;</button></div>
    </div></div>`;
  }
}

function reset(){
  state.screen=0;
  state.answers={};
  state.sScores={1:0,2:0,3:0};
  state.urgency=null;
  updateProgress();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
